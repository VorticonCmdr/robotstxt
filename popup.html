<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>robots.txt emulator</title>
    <style>
    body {
      width: 280px;
      margin: 8px;
    }
    .blocking-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 10px 16px;
      font-size: 18px;
      font-weight: normal;
      cursor: pointer;
      user-select: none;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #f8f8f8;
      box-sizing: border-box;
      margin-bottom: 5px;
    }
    .blocking-label:hover {
      background: #e8e8e8;
    }
    #state {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #31b0d5;
      flex-shrink: 0;
    }
    </style>
  </head>
  <body>
    <label class="blocking-label" for="state">
      <input type="checkbox" id="state" />
      Blocking
    </label>
    <button id="logger" type="button" class="btn btn-default btn-lg btn-block">live protocol</button>
    <button id="robots" type="button" class="btn btn-default btn-lg btn-block">robots.txt cache</button>
    <button id="options" type="button" class="btn btn-default btn-lg btn-block">options</button>

    <script type="module" src="/src/popup.js"></script>
  </body>
</html>
