<!doctype html>
<html>
  <head>
    <title>robots.txt emulator — cache</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body { height: 100%; overflow: hidden; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 13px;
        background: #f5f5f5;
        color: #222;
      }

      .page { display: flex; flex-direction: column; height: 100%; }

      /* ── header ── */
      header {
        background: #fff;
        color: #222;
        padding: 0 16px;
        height: 44px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        border-bottom: 1px solid #e0e0e0;
      }
      header .title { font-size: 14px; font-weight: 600; }

      /* ── controls ── */
      .controls {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: #fff;
        border-bottom: 1px solid #e0e0e0;
        flex-shrink: 0;
      }
      .controls select,
      .controls input[type="search"] {
        background: #fff;
        border: 1px solid #ccc;
        color: #222;
        border-radius: 4px;
        padding: 5px 8px;
        font-size: 13px;
        outline: none;
      }
      .controls input[type="search"] { flex: 1; max-width: 360px; min-width: 180px; }
      .controls input[type="search"]:focus { border-color: #1a73e8; }
      .controls select { min-width: 160px; max-width: 260px; }
      .controls button {
        background: #fff;
        border: 1px solid #ccc;
        color: #333;
        border-radius: 4px;
        padding: 5px 12px;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
      }
      .controls button:hover { background: #f0f0f0; }
      .controls button.btn-primary { border-color: #1a73e8; color: #1a73e8; }
      .controls button.btn-primary:hover { background: #e8f0fe; }
      .controls button.btn-danger { border-color: #c0392b; color: #c0392b; }
      .controls button.btn-danger:hover { background: #fdecea; }
      .controls .spacer { flex: 1; }

      /* ── main: single annotation panel ── */
      .main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }
      .panel {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: #fff;
        flex: 1;
      }
      .panel-hdr {
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #888;
        border-bottom: 1px solid #e8e8e8;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        height: 32px;
        background: #fafafa;
      }
      .panel-body { flex: 1; overflow: auto; }

      /* ── left panel: textarea ── */
      #robotstxt {
        display: block;
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
        color: #222;
        font-family: 'SF Mono', 'Menlo', 'Consolas', 'Courier New', monospace;
        font-size: 13px;
        line-height: 22px;
        padding: 10px 16px;
        resize: none;
        outline: none;
        white-space: pre;
        overflow-wrap: normal;
      }

      /* ── right panel: annotation ── */
      .ann-status { display: flex; gap: 10px; font-size: 11px; }
      .ann-errors   { color: #c0392b; font-weight: 600; }
      .ann-warnings { color: #b45309; font-weight: 600; }

      #annotationLines { padding: 10px 0; }

      .ann-line {
        display: flex;
        align-items: center;
        height: 22px;
        padding: 0 8px 0 4px;
        gap: 6px;
        font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
        font-size: 13px;
        white-space: pre;
        cursor: default;
      }
      .ann-line:hover { background: #f5f5f5; }
      .ann-matched { background: #f0fdf4 !important; border-left: 3px solid #16a34a !important; }
      .ann-err-line { background: #fff5f5; border-left: 3px solid #c0392b; }

      .ann-num {
        color: #bbb;
        font-size: 11px;
        min-width: 24px;
        text-align: right;
        user-select: none;
        flex-shrink: 0;
      }
      .ann-ind { width: 14px; text-align: center; user-select: none; flex-shrink: 0; }
      .ann-text {
        flex: 1;
        min-width: 0;
        color: #222;
        outline: none;
        white-space: pre;
        caret-color: #222;
      }
      .ann-badge {
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 3px;
        font-weight: 600;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .badge-error        { background: #fee2e2; color: #991b1b; }
      .badge-warn         { background: #fef3c7; color: #92400e; }
      .badge-allow-rule   { background: #dcfce7; color: #166534; }
      .badge-disallow-rule{ background: #fee2e2; color: #991b1b; }

      /* ── url tester ── */
      .url-tester {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        background: #fff;
        border-top: 1px solid #e0e0e0;
        flex-shrink: 0;
      }
      .url-tester input {
        background: #fff;
        border: 1px solid #ccc;
        color: #222;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 13px;
        outline: none;
      }
      .url-tester input:focus { border-color: #1a73e8; }
      #urlInput { flex: 1; }
      #agentInput { width: 140px; }
      #testerResult {
        font-weight: 700;
        font-size: 12px;
        padding: 5px 14px;
        border-radius: 4px;
        letter-spacing: 0.06em;
        white-space: nowrap;
        min-width: 90px;
        text-align: center;
      }
      .tester-allowed { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
      .tester-blocked { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
      #testerInfo { font-size: 12px; color: #888; white-space: nowrap; }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <span class="title">robots.txt emulator — cache</span>
      </header>

      <div class="controls">
        <select id="tabSelect">
          <option value="">all tabs</option>
        </select>
        <input type="search" id="hostSearch" list="hostDatalist" placeholder="search host…" autocomplete="off" />
        <datalist id="hostDatalist"></datalist>
        <div class="spacer"></div>
        <button id="btnUpdate" class="btn-primary">(Re)fetch</button>
        <button id="btnClear" class="btn-danger">Clear selected</button>
        <button id="btnClearAll" class="btn-danger">Clear all</button>
      </div>

      <textarea id="robotstxt" style="display:none"></textarea>

      <div class="main">
        <div class="panel">
          <div class="panel-hdr">
            Annotated View
            <span class="ann-status">
              <span id="annErrors" class="ann-errors" style="display:none"></span>
              <span id="annWarnings" class="ann-warnings" style="display:none"></span>
            </span>
          </div>
          <div class="panel-body" id="annScroll">
            <div id="annotationLines"></div>
          </div>
        </div>
      </div>

      <div class="url-tester">
        <input type="url" id="urlInput" placeholder="https://example.com/path/to/test" />
        <input type="text" id="agentInput" placeholder="*" />
        <span id="testerResult"></span>
        <span id="testerInfo"></span>
      </div>
    </div>

    <script type="module" src="/src/robots.js"></script>
  </body>
</html>
