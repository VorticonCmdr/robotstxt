name: Release

on:
  push:
    branches: [master]
    paths:
      - manifest.json

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from manifest
        id: version
        run: echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      - name: Build extension
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run build

      - name: Create zip
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cd dist
          zip -r "../robotstxt-v${{ steps.version.outputs.version }}.zip" .
          cd ..

      - name: Create release
        if: steps.tag_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes "Chrome Web Store upload package for v${{ steps.version.outputs.version }}. Download the zip and upload it at [Chrome Developer Dashboard](https://chrome.google.com/webstore/devconsole)." \
            "robotstxt-v${{ steps.version.outputs.version }}.zip"
